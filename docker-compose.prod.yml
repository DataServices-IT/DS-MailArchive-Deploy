#  DS-MailArchive — Docker Compose PRODUCTION
#  DataServices © 2026
#
#  ✅ Utilise les images pré-buildées depuis GHCR
#  ✅ Aucune compilation locale requise
#  ✅ Images publiques — aucun token nécessaire
#
#  Installation rapide (Proxmox / Synology / Linux / Raspberry Pi) :
#    mkdir -p /opt/ds-mailarchive && cd /opt/ds-mailarchive
#    curl -fsSL https://raw.githubusercontent.com/DataServices-IT/DS-MailArchive-Deploy/main/docker-compose.prod.yml -o docker-compose.yml
#    curl -fsSL https://raw.githubusercontent.com/DataServices-IT/DS-MailArchive-Deploy/main/.env.example -o .env
#    nano .env          # Renseigner les mots de passe
#    docker compose up -d
# ============================================================

name: ds-mailarchive

services:

  # ── Application DataMail Archive ─────────────────────────
  datamailarchive:
    image: ghcr.io/dataservices-it/ds-mailarchive:latest
    container_name: datamailarchive-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Base de données
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mailarchiver_db;Username=mailarchiver;Password=${DB_PASSWORD}
      # Accès admin
      - Authentication__Username=${ADMIN_USER:-admin}
      - Authentication__Password=${ADMIN_PASSWORD}
      # Fuseau horaire
      - TimeZone__DisplayTimeZoneId=${TIMEZONE:-Europe/Paris}
      # Synchro IMAP
      - MailSync__IntervalMinutes=${SYNC_INTERVAL:-15}
      - MailSync__TimeoutMinutes=120
      - MailSync__ConnectionTimeoutSeconds=300
      - MailSync__CommandTimeoutSeconds=600
      # Upload
      - Upload__MaxFileSizeGB=10
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=${TIMEZONE:-Europe/Paris}
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    networks:
      - datamailarchive-net
    labels:
      - "com.dataservices.app=datamailarchive"
      - "com.dataservices.version=1.0"

  # ── Base de données PostgreSQL ───────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: datamailarchive-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mailarchiver_db
      - POSTGRES_USER=mailarchiver
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - datamailarchive-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailarchiver -d mailarchiver_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Reverse proxy Nginx avec branding intégré ────────────
  #    nginx.conf et inject.css/js sont embarqués dans l'image
  #    Aucun fichier local requis sur le serveur
  nginx:
    image: ghcr.io/dataservices-it/ds-mailarchive-nginx:latest
    container_name: datamailarchive-nginx
    restart: unless-stopped
    depends_on:
      - datamailarchive
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - datamailarchive-net

  # ── Backup automatique quotidienne (02h00) ───────────────
  #    backup.sh embarqué dans l'image — aucun fichier local
  backup:
    image: ghcr.io/dataservices-it/ds-mailarchive-backup:latest
    container_name: datamailarchive-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=${DB_PASSWORD}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-30}
    volumes:
      - backups_data:/backups
    networks:
      - datamailarchive-net

# ── Volumes persistants ───────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  exports_data:
    driver: local
  backups_data:
    driver: local

# ── Réseau isolé ─────────────────────────────────────────
networks:
  datamailarchive-net:
    driver: bridge
